<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AuraCart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auracart-body">

    <div id="pageLoader" class="page-loader">
        <div class="loader-inner">
            <div class="luxury-spinner"></div>
            <p class="loader-text">Loading AuraCart...</p>
        </div>
    </div>

    <div class="bg-animation">
        <span class="blob blob1"></span>
        <span class="blob blob2"></span>
    </div>

    <section class="admin-login-section">
        <div class="container">
            <div class="admin-login-wrapper fade-up">
                <div class="admin-login-card">
                    <p class="section-kicker mb-2">Admin Access</p>
                    <h1 class="admin-login-title">Welcome back</h1>
                    <p class="admin-login-text">
                        Sign in to manage orders, products, and inventory across AuraCart.
                    </p>

                    {% if error %}
                    <div class="alert alert-danger mt-3">{{ error }}</div>
                    {% endif %}

                    <form method="POST" class="mt-4" id="adminLoginForm">
                        <div class="mb-3">
                            <label class="luxury-label">Username</label>
                            <input type="text" name="username" class="form-control luxury-input" placeholder="Enter username">
                        </div>

                        <div class="mb-4">
                            <label class="luxury-label">Password</label>
                            <input type="password" name="password" class="form-control luxury-input" placeholder="Enter password">
                        </div>

                        <button type="submit" class="btn premium-gold-btn w-100 admin-login-btn">
                            Login
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="{{ url_for('home') }}" class="back-link">← Back to Store</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        window.addEventListener("load", function () {
            const loader = document.getElementById("pageLoader");
            setTimeout(() => loader.classList.add("hidden"), 300);
        });

        document.addEventListener("DOMContentLoaded", function () {
            const form = document.getElementById("adminLoginForm");
            if (form) {
                form.addEventListener("submit", function () {
                    document.getElementById("pageLoader").classList.remove("hidden");
                });
            }
        });
    </script>
</body>
</html>
